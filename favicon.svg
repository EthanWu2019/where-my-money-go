<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32d74b"/>
      <stop offset="100%" style="stop-color:#30d158"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#0a0a0a"/>
  <!-- 美元符号 -->
  <text x="16" y="22" text-anchor="middle" font-size="18" font-weight="800" fill="url(#g)" font-family="Inter, -apple-system, sans-serif">$</text>
  <!-- 小图表线条 -->
  <polyline points="4,22 8,18 12,20 16,14 20,16 24,10 28,12" fill="none" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
