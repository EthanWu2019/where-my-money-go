<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海绵酱记账本</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode">
    <!-- Background Gradient Orbs -->
    <div class="bg-decoration" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>
    <div class="bg-noise" aria-hidden="true"></div>

    <header class="header">
        <div class="header-content">
            <div class="header-main">
                <h1>海绵酱记账本</h1>
            </div>
            <div class="header-controls">
                <div class="meta-info">
                    <span id="update-time">最后同步: --</span>
                    <span id="exchange-rate">实时汇率: --</span>
                </div>
                <button id="theme-toggle" class="theme-toggle-btn" title="切换主题">
                    <span id="theme-icon">☀️</span>
                </button>
            </div>
        </div>
    </header>

    <div class="tabs-wrapper">
        <nav class="tabs">
            <div class="tab-indicator"></div>
            <button class="tab-btn active" data-view="all">全部总览</button>
            <button class="tab-btn" data-view="weekly">周期简报</button>
            <button class="tab-btn" data-view="monthly">月度核算</button>
        </nav>
    </div>

    <main class="container">
        <!-- Controls Bar -->
        <div class="controls-bar">
            <div class="nav-buttons" id="period-nav" style="display: none;">
                <button id="prev-period" class="btn secondary-btn">← 上一期</button>
                <span id="current-period-label" class="period-label"></span>
                <button id="next-period" class="btn secondary-btn">下一期 →</button>
            </div>
            
            <div class="currency-switcher">
                <div class="currency-indicator"></div>
                <button class="currency-btn active" id="btn-usd">USD</button>
                <button class="currency-btn" id="btn-rmb">RMB</button>
            </div>
        </div>

        <!-- Summary Cards -->
        <section class="summary-grid">
            <div class="card summary-card income">
                <div class="card-title">总收入</div>
                <div class="card-amount" id="total-income">$0.00</div>
            </div>
            <div class="card summary-card expense">
                <div class="card-title">总支出</div>
                <div class="card-amount" id="total-expense">$0.00</div>
            </div>
            <div class="card summary-card net">
                <div class="card-title">净收支</div>
                <div class="card-amount" id="net-balance">$0.00</div>
            </div>
        </section>

        <!-- Dashboard: Categories + Chart -->
        <div class="dashboard-layout">
            <div class="layout-left">
                <section class="section-container">
                    <h2 class="section-title">分类明细</h2>
                    <div class="category-grid" id="category-container">
                        <!-- Dynamic category cards -->
                    </div>
                </section>
            </div>
            
            <div class="layout-right">
                <section class="section-container">
                    <h2 class="section-title">支出分布</h2>
                    <div class="card chart-card">
                        <div class="chart-wrapper">
                            <canvas id="expenseChart"></canvas>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <!-- Transaction Table -->
        <section class="section-container">
            <div class="table-header-flex">
                <h2 class="section-title">交易流水</h2>
                <div class="filter-badge" id="filter-tip" style="display: none;">
                    当前筛选: <span id="current-filter"></span> 
                    <button id="clear-filter" class="clear-btn">✕</button>
                </div>
            </div>
            <div class="table-wrapper card">
                <table id="records-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>项目</th>
                            <th>分类</th>
                            <th>金额</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody id="records-body">
                        <!-- Dynamic table rows -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
